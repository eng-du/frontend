name: Deploy Frontend to EC2 (dev/prod)

on:
  push:
    branches: ["develop", "main"]

jobs:
  deploy:
    if: github.repository == 'eng-du/frontend'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Set target by branch
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "DEPLOY_DIR=/home/${{ secrets.EC2_USER }}/frontend-prod" >> $GITHUB_ENV
            echo "VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL_PROD }}" >> $GITHUB_ENV
            echo "VITE_AMPLITUDE_API_KEY=${{ secrets.VITE_AMPLITUDE_API_KEY_PROD }}" >> $GITHUB_ENV
            echo "ENV_NAME=prod" >> $GITHUB_ENV
          else
            echo "DEPLOY_DIR=/home/${{ secrets.EC2_USER }}/frontend-dev" >> $GITHUB_ENV
            echo "VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL_DEV }}" >> $GITHUB_ENV
            echo "VITE_AMPLITUDE_API_KEY=${{ secrets.VITE_AMPLITUDE_API_KEY_DEV }}" >> $GITHUB_ENV
            echo "ENV_NAME=dev" >> $GITHUB_ENV
          fi

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ env.VITE_API_BASE_URL }}
          VITE_AMPLITUDE_API_KEY: ${{ env.VITE_AMPLITUDE_API_KEY }}

      - name: Pack dist
        run: tar -czf dist.tgz dist

      - name: Upload dist.tgz to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "dist.tgz"
          target: "/home/${{ secrets.EC2_USER }}/deploy"

      - name: Deploy (swap dist)
        uses: appleboy/ssh-action@v1.0.3
        env:
          DEPLOY_DIR: ${{ env.DEPLOY_DIR }}
          ENV_NAME: ${{ env.ENV_NAME }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd ~/deploy

            echo "Deploying $ENV_NAME to $DEPLOY_DIR"

            rm -rf "$DEPLOY_DIR/dist_new"
            mkdir -p "$DEPLOY_DIR/dist_new"
            tar -xzf dist.tgz -C "$DEPLOY_DIR/dist_new"

            rm -rf "$DEPLOY_DIR/dist_prev"
            if [ -d "$DEPLOY_DIR/dist" ]; then
              mv "$DEPLOY_DIR/dist" "$DEPLOY_DIR/dist_prev"
            fi

            mv "$DEPLOY_DIR/dist_new/dist" "$DEPLOY_DIR/dist"

            sudo nginx -t
            sudo systemctl reload nginx
