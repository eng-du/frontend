name: Lighthouse CI

on:
  pull_request:
    branches: ['main']

jobs:
  lighthouse:
    if: github.repository == 'eng-du/frontend'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    strategy:
      max-parallel: 1 # 토큰 발급 이슈 방지를 위해 순차 실행
      matrix:
        config: [
          { name: 'public-mobile', file: 'lighthouserc.public.mobile.cjs' },
          { name: 'public-desktop', file: 'lighthouserc.public.desktop.cjs' },
          { name: 'auth-mobile', file: 'lighthouserc.auth.mobile.cjs' },
          { name: 'auth-desktop', file: 'lighthouserc.auth.desktop.cjs' }
        ]
    name: lighthouse-${{ matrix.config.name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Lighthouse CI
        run: npx lhci autorun --config=${{ matrix.config.file }}
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Extract Metrics
        run: node scripts/extract-metrics.cjs

      - name: Post PR Comment
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: lighthouse-${{ matrix.config.name }}
          path: .lighthouseci/reports/summary.md

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-${{ matrix.config.name }}-${{ github.sha }}
          path: .lighthouseci/reports/
