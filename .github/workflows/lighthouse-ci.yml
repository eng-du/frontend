      - name: Run Lighthouse CI (Auth Desktop)
        run: npx lhci autorun --config=lighthouserc.auth.desktop.cjs
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
