name: Lighthouse CI

on:
  pull_request:
    branches: ['main']

jobs:
  lighthouse-public-mobile:
    if: github.repository == 'eng-du/frontend'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Lighthouse CI (Public Mobile)
        run: npx lhci autorun --config=lighthouserc.public.mobile.cjs
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

  lighthouse-public-desktop:
    if: github.repository == 'eng-du/frontend'
