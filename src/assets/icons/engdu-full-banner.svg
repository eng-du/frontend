<svg width="300" height="229" viewBox="0 0 166 229" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    #head {
    transform-box: fill-box;
    transform-origin: 50% 78%; /* 머리/몸통 그룹의 아래쪽 중심 */
    animation: headTilt 4s ease-in-out infinite;
    }

    #eyeL, #eyeR {
    transform-box: fill-box;
    transform-origin: center;
    animation: blink 3.5s infinite;
    }

    #eyeHighlightL,
    #eyeHighlightR {
    transform-box: fill-box;
    transform-origin: center;
    animation: eyeMove 5s ease-in infinite;
    }

    @keyframes eyeMove {
    0%, 100% { transform: translateX(0px); }

    60% { transform: translate(-6px, 3px); } /* 왼쪽 */
    }

    #bookHands {
    transform-box: fill-box;
    transform-origin: center;
    animation: bookBounce 4s cubic-bezier(0.34, 1.56, 0.64, 1) infinite;
    }

    @keyframes bookBounce {
    0%, 100% {
    transform: translate(0px, 0px);
    }

    60% {
    transform: translate(2px, 2px);
    }
    }

    @keyframes blink {
    0%, 88%, 100% { transform: scaleY(1); }
    90% { transform: scaleY(0.10); }
    92% { transform: scaleY(1); }
    }

    @keyframes headTilt {
    0%, 60%, 100% {
    transform: rotate(0deg) translate(0px, 0px) scale(1);
    }

    66% {
    transform: rotate(3deg) translate(2px, 2px) scaleX(1.01) scaleY(0.99);
    }

    71% {
    transform: rotate(1deg) translate(0px, -1px) scaleX(0.995) scaleY(1.01);
    }
    76% {
    transform: rotate(0deg) translate(0px, 0px) scale(1);
    }

    86% {
    transform: rotate(-3.5deg) translate(-2px, 0.5px) scaleX(1.005) scaleY(0.995);
    }

    91% {
    transform: rotate(-1deg) translate(0.5px, 0px) scale(1);
    }

    96% {
    transform: rotate(0deg) translate(0px, 0px) scale(1);
    }
    }

    #burstLetters .icon {
    font-size: 50px;
    font-weight: bold;
    fill: #2663EB;
    opacity: 0;
    transform-box: fill-box;
    transform-origin: center;
    animation-duration: 3s;
    animation-timing-function: cubic-bezier(0.2, 0.8, 0.2, 1);
    animation-iteration-count: infinite;
    }

    .i1 {
    animation-name: burst1;
    }

    .i2 {
    animation-name: burst2;
    animation-delay: 0.5s;
    }

    .i3 {
    animation-name: burst3;
    animation-delay: 1s;
    }


    @keyframes burst1 {
    0% { transform: translate(0,0) scale(0.2) rotate(0deg); opacity: 0; }
    50% { opacity: 1; }
    100% { transform: translate(100px, -30px) scale(1) rotate(20deg); opacity: 0; }
    }

    @keyframes burst2 {
    0% { transform: translate(0,0) scale(0.2) rotate(0deg); opacity: 0; }
    50% { opacity: 1; }
    100% { transform: translate(-120px, -10px) scale(1) rotate(-15deg); opacity: 0; }
    }

    @keyframes burst3 {
    0% { transform: translate(0,0) scale(0.2) rotate(0deg); opacity: 0; }
    50% { opacity: 1; }
    100% { transform: translate(90px, 50px) scale(1) rotate(30deg); opacity: 0; }
    }
  </style>

